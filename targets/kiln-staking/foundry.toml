# Foundry Configuration for Kiln Staking Contracts
# Optimized for mainnet fork testing and vulnerability research

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"

# Compiler settings
solc_version = "0.8.20"  # Adjust based on actual contract version
evm_version = "paris"
optimizer = true
optimizer_runs = 200
via_ir = false

# Mainnet fork configuration
eth_rpc_url = "${MAINNET_RPC_URL}"
fork_block_number = 18500000  # Pick a recent stable block

# Verbosity
verbosity = 3

# Test settings
fuzz_runs = 256
fuzz_max_test_rejects = 65536

# Gas reporting
gas_reports = ["*"]

# Formatting
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

# Remappings for common dependencies
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

# RPC endpoints
[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"

# Etherscan API keys for contract verification
[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }

# Profile for quick testing (fewer fuzz runs)
[profile.quick]
fuzz_runs = 32
verbosity = 2

# Profile for intensive fuzzing
[profile.intense]
fuzz_runs = 10000
fuzz_max_test_rejects = 1000000
verbosity = 4
