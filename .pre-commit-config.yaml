# Pre-commit hooks for SecBrain
# Install with: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: \.sol$
      - id: end-of-file-fixer
        exclude: \.sol$
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Python: Black formatter
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3.11
        args: ['--config', 'secbrain/pyproject.toml']
        files: ^secbrain/

  # Python: Ruff linter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.1
    hooks:
      - id: ruff
        args: ['--config', 'secbrain/pyproject.toml', '--fix']
        files: ^secbrain/

  # Python: MyPy type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: ['--config-file', 'secbrain/pyproject.toml']
        files: ^secbrain/secbrain/
        additional_dependencies:
          - types-PyYAML
          - types-requests
          - pydantic

  # Python: Bandit security linter
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ['-c', 'secbrain/pyproject.toml', '-ll']
        files: ^secbrain/secbrain/

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: \.lock$|package-lock\.json$

  # Solidity: Format with Prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [solidity]
        additional_dependencies:
          - prettier@3.2.4
          - prettier-plugin-solidity@1.3.1

  # Solidity: Lint with Solhint (if config exists)
  - repo: local
    hooks:
      - id: solhint
        name: solhint
        language: node
        entry: npx solhint
        files: \.sol$
        additional_dependencies: ['solhint@4.1.1']

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ['-d', '{extends: default, rules: {line-length: {max: 120}, document-start: disable}}']

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: ['--fix', '--config', '.markdownlint-cli2.yaml']

  # Check for dependency vulnerabilities (informational only in pre-commit)
  - repo: local
    hooks:
      - id: safety
        name: safety check (informational)
        entry: bash -c 'cd secbrain && echo "Running safety check..." && safety check || echo "⚠️  Safety check found issues. Review before committing."'
        language: system
        pass_filenames: false
        files: requirements.*\.txt$|pyproject\.toml$
        verbose: true

# Configuration for individual hooks
default_language_version:
  python: python3.11
  node: '20'

# CI integration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [mypy, safety, solhint]
  submodules: false
