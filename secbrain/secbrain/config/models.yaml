# SecBrain Model Configuration - FREE TIER OPTIMIZED
#
# This file configures AI model providers for different SecBrain components.
# ALL DEFAULT MODELS ARE CONFIGURED TO USE FREE TIERS OR USER'S PRO SUBSCRIPTIONS
#
# FREE TIER PROVIDERS CONFIGURED:
# - Together AI: Free tier models (Llama-3.2-3B, Llama-3-8B)
# - Perplexity: Free tier "sonar" model (with PRO subscription = unlimited)
# - Google Gemini: Free with PRO subscription
# - Groq: Free tier with rate limits (commented out alternative)
# - OpenRouter: Free models with :free suffix (commented out alternative)
# 
# TROUBLESHOOTING PROVIDER SPEND LIMITS:
# If you encounter spend limit errors (e.g., "spend_limit_reached"), you can:
#   1. Switch to alternative free providers by uncommenting configurations below
#   2. Use local models (see 'local' configuration)
#   3. Verify you're using the free tier models listed above
#
# REQUIRED API KEYS (set as environment variables):
#   - TOGETHER_API_KEY: For Together AI (FREE tier available)
#   - PERPLEXITY_API_KEY: For research (FREE with PRO subscription)
#   - GOOGLE_API_KEY: For Gemini models (FREE with PRO subscription)
#   - GROQ_API_KEY: (Optional) For Groq models (FREE tier available)
#   - OPENROUTER_API_KEY: (Optional) For OpenRouter (FREE models available)

# Default configuration - Uses FREE tier models from Together AI
# These models are available on Together AI's free tier with generous rate limits
worker:
  provider: openai_compatible
  model: meta-llama/Llama-3.2-3B-Instruct-Turbo  # Free tier - Hypothesis generation
  base_url: https://api.together.xyz/v1
  max_tokens: 8192
  temperature: 0.3

advisor:
  provider: openai_compatible
  model: meta-llama/Meta-Llama-3-8B-Instruct-Turbo  # Free tier - Severity / validation
  base_url: https://api.together.xyz/v1
  max_tokens: 4096
  temperature: 0.2

research:
  provider: perplexity
  model: sonar  # Free tier model - fast, efficient research
  max_calls_per_run: 20
  max_calls_per_phase: 5

# Alternative configurations for different environments

# Local-only inference (no API costs, requires local Ollama installation)
local:
  worker:
    provider: ollama
    model: llama3.1:70b
    base_url: http://localhost:11434
  advisor:
    provider: ollama
    model: llama3.1:70b
    base_url: http://localhost:11434

# Budget-conscious configuration - Even smaller free tier models
cheap:
  worker:
    provider: openai_compatible
    model: meta-llama/Llama-3.2-1B-Instruct-Turbo  # Smallest free tier model
    base_url: https://api.together.xyz/v1
  advisor:
    provider: openai_compatible
    model: meta-llama/Llama-3.2-3B-Instruct-Turbo  # Small free tier model
    base_url: https://api.together.xyz/v1

# Premium configuration (uses user's PRO subscriptions - FREE for user)
# Uses Google PRO and larger free tier models
premium:
  worker:
    provider: openai_compatible
    model: meta-llama/Meta-Llama-3-8B-Instruct-Turbo  # Free tier, best quality
    base_url: https://api.together.xyz/v1
  advisor:
    provider: gemini
    model: gemini-2.0-flash-exp  # FREE with Google PRO subscription

# Alternative provider configurations (uncomment to use)

