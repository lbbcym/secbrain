# SecBrain Model Configuration
#
# This file configures AI model providers for different SecBrain components.
#
# REQUIRED API KEYS (set as environment variables):
#   - TOGETHER_API_KEY: For Together AI (default provider)
#   - OPENAI_API_KEY: For OpenAI models
#   - GOOGLE_API_KEY: For Gemini models
#   - GROQ_API_KEY: For Groq models
#   - PERPLEXITY_API_KEY: For research capabilities

# Default configuration - Uses Together AI for cost-effective, high-quality inference
worker:
  provider: openai_compatible
  model: deepseek-ai/DeepSeek-V3          # Hypothesis generation / complex reasoning
  base_url: https://api.together.xyz/v1
  max_tokens: 16384
  temperature: 0.3

advisor:
  provider: openai_compatible
  model: Qwen/Qwen2.5-Coder-32B-Instruct  # Severity / validation
  base_url: https://api.together.xyz/v1
  max_tokens: 4096
  temperature: 0.2

research:
  provider: perplexity
  model: sonar-medium-online
  max_calls_per_run: 20
  max_calls_per_phase: 5

# Alternative configurations for different environments

# Local-only inference (no API costs, requires local Ollama installation)
local:
  worker:
    provider: ollama
    model: llama3.1:70b
    base_url: http://localhost:11434
  advisor:
    provider: ollama
    model: llama3.1:70b
    base_url: http://localhost:11434

# Budget-conscious configuration (faster, cheaper models)
cheap:
  worker:
    provider: openai_compatible
    model: meta-llama/Llama-3.1-8B-Instruct-Turbo
    base_url: https://api.together.xyz/v1
  advisor:
    provider: openai_compatible
    model: meta-llama/Llama-3.1-8B-Instruct-Turbo
    base_url: https://api.together.xyz/v1

# Premium configuration (highest quality, higher cost)
premium:
  worker:
    provider: openai_compatible
    model: deepseek-ai/DeepSeek-V3
    base_url: https://api.together.xyz/v1
  advisor:
    provider: gemini
    model: gemini-1.5-pro

