acls:
  http_client:
    allowed: true
    require_approval: false
    max_calls_per_run: 5000
    allowed_phases: ["recon", "hypothesis", "exploit", "triage"]

  forge_test_exploit:
    allowed: true
    require_approval: true
    max_calls_per_run: 100
    allowed_phases: ["exploit"]

  subfinder:
    allowed: true
    require_approval: false
    max_calls_per_run: 50
    allowed_phases: ["recon"]

rate_limits:
  http_client:
    requests_per_minute: 120
    burst: 20
    backoff_factor: 2.0
    max_backoff: 60.0

  forge_test_exploit:
    requests_per_minute: 10
    burst: 2
    backoff_factor: 3.0
    max_backoff: 300.0

global_rate_limit:
  requests_per_minute: 60
  burst: 10
  backoff_factor: 2.0
  max_backoff: 60.0
