rules:
  - id: solidity-reentrancy-external-call
    pattern-either:
      - pattern: $ADDR.call(...)
      - pattern: $ADDR.delegatecall(...)
      - pattern: payable($ADDR).transfer(...)
      - pattern: payable($ADDR).send(...)
    message: |
      External call detected - check for reentrancy vulnerabilities.
      Follow the Checks-Effects-Interactions pattern:
      1. Perform checks (require statements)
      2. Update state variables
      3. Make external calls
      Consider using ReentrancyGuard or similar protection.
    severity: WARNING
    languages: [solidity]
    metadata:
      category: security
      cwe: "CWE-841: Improper Enforcement of Behavioral Workflow"
      owasp: "A04:2021 - Insecure Design"
      confidence: MEDIUM
      likelihood: HIGH
      impact: CRITICAL
      subcategory:
        - vuln

  - id: solidity-unchecked-low-level-call
    patterns:
      - pattern-either:
          - pattern: $ADDR.call(...)
          - pattern: $ADDR.delegatecall(...)
          - pattern: $ADDR.staticcall(...)
      - pattern-not-inside: |
          ($SUCCESS, ...) = $ADDR.$FUNC(...);
          require($SUCCESS, ...);
    message: |
      Low-level call return value not checked.
      Always check the return value of low-level calls (call, delegatecall, staticcall).
    severity: ERROR
    languages: [solidity]
    metadata:
      category: security
      cwe: "CWE-252: Unchecked Return Value"
      owasp: "A04:2021 - Insecure Design"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      subcategory:
        - vuln
    fix: |
      Check the return value:
      (bool success, bytes memory data) = addr.call("");
      require(success, "Call failed");

  - id: solidity-tx-origin-auth
    pattern: require(tx.origin == $ADDR, ...)
    message: |
      Using tx.origin for authorization is dangerous and can lead to phishing attacks.
      Use msg.sender instead for authorization checks.
    severity: ERROR
    languages: [solidity]
    metadata:
      category: security
      cwe: "CWE-346: Origin Validation Error"
      owasp: "A04:2021 - Insecure Design"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      subcategory:
        - vuln
    fix: |
      Use msg.sender for authorization:
      require(msg.sender == owner, "Not authorized");

  - id: solidity-selfdestruct-usage
    pattern-either:
      - pattern: suicide(...)
      - pattern: selfdestruct(...)
    message: |
      selfdestruct (or deprecated suicide) usage detected.
      IMPORTANT SECURITY CHECKS:
      1. Ensure proper access control (use onlyOwner modifier or require statements)
      2. Consider if selfdestruct is necessary - it's a dangerous operation
      3. Note: suicide() is deprecated legacy syntax, use selfdestruct()
      4. Consider alternative upgrade patterns instead of selfdestruct
    severity: WARNING
    languages: [solidity]
    metadata:
      category: security
      cwe: "CWE-284: Improper Access Control"
      owasp: "A01:2021 - Broken Access Control"
      confidence: HIGH
      likelihood: MEDIUM
      impact: CRITICAL
      subcategory:
        - vuln
    fix: |
      Ensure access control:
      function destroy() public onlyOwner {
          selfdestruct(payable(owner));
      }

  - id: solidity-weak-randomness
    patterns:
      - pattern-either:
          - pattern: block.timestamp
          - pattern: block.number
          - pattern: blockhash(...)
          - pattern: block.difficulty
      - pattern-inside: |
          ... % ...
    message: |
      Using block properties for randomness is predictable and can be manipulated.
      Use a secure randomness source like Chainlink VRF.
    severity: WARNING
    languages: [solidity]
    metadata:
      category: security
      cwe: "CWE-330: Use of Insufficiently Random Values"
      owasp: "A02:2021 - Cryptographic Failures"
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
      subcategory:
        - vuln
    fix: |
      Use Chainlink VRF or similar oracle-based randomness:
      import "@chainlink/contracts/src/v0.8/VRFConsumerBase.sol";

  - id: solidity-old-version
    pattern-regex: 'pragma\s+solidity\s+[\\^~><=]*0\.[0-7]\.'
    message: |
      Using Solidity version < 0.8.0 detected.
      Versions before 0.8.0 do not have built-in overflow/underflow protection.
      Consider upgrading to Solidity 0.8.0+ or use SafeMath library.
    severity: WARNING
    languages: [solidity]
    metadata:
      category: security
      cwe: "CWE-190: Integer Overflow"
      owasp: "A04:2021 - Insecure Design"
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      subcategory:
        - vuln

  - id: solidity-delegatecall-usage
    pattern: $ADDR.delegatecall(...)
    message: |
      delegatecall usage detected - ensure the target address is trusted.
      delegatecall to untrusted contracts can lead to complete contract takeover.
      Verify the target address is immutable and from a trusted source.
    severity: WARNING
    languages: [solidity]
    metadata:
      category: security
      cwe: "CWE-829: Inclusion of Functionality from Untrusted Control Sphere"
      owasp: "A08:2021 - Software and Data Integrity Failures"
      confidence: MEDIUM
      likelihood: HIGH
      impact: CRITICAL
      subcategory:
        - vuln
    fix: |
      Only delegatecall to trusted, immutable addresses:
      address public immutable implementation;
      implementation.delegatecall(data);

  - id: solidity-ether-transfer
    pattern-either:
      - pattern: payable($ADDR).transfer(...)
      - pattern: payable($ADDR).send(...)
    message: |
      Ether transfer detected - ensure proper access control and error handling.
      - Use access control modifiers (e.g., onlyOwner) or require statements
      - Handle return values from send() properly
      - Consider using call() with proper checks instead of transfer/send
    severity: WARNING
    languages: [solidity]
    metadata:
      category: security
      cwe: "CWE-284: Improper Access Control"
      owasp: "A01:2021 - Broken Access Control"
      confidence: MEDIUM
      likelihood: HIGH
      impact: CRITICAL
      subcategory:
        - vuln
