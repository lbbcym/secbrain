name: Foundry Fuzzing & Invariant Tests

on:
  push:
    branches: [main, develop]
    paths:
      - '**/*.sol'
      - 'foundry.toml'
      - 'test/**'
      - '.github/workflows/foundry-fuzzing.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '**/*.sol'
      - 'foundry.toml'
      - 'test/**'
      - '.github/workflows/foundry-fuzzing.yml'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Foundry profile to use'
        required: false
        default: 'ci'
        type: choice
        options:
          - quick
          - default
          - ci
          - intense

permissions:
  contents: read
  pull-requests: write

jobs:
  quick-fuzz:
    name: Quick Fuzzing (32 runs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run quick fuzz tests
        env:
          FOUNDRY_PROFILE: quick
        run: |
          forge test -vv

      - name: Generate quick test summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## ⚡ Quick Fuzzing Results

          **Profile**: Quick (32 runs)
          **Purpose**: Fast feedback for development
          **Use case**: Pre-commit checks, rapid iteration

          ---
          EOF

  standard-fuzz:
    name: Standard Fuzzing (256 runs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run standard fuzz tests
        run: |
          forge test -vv

      - name: Run invariant tests
        run: |
          forge test --match-contract Invariant -vvv || true

      - name: Generate gas report
        run: |
          forge test --gas-report > gas-report.txt || true
          cat gas-report.txt

      - name: Upload gas report
        uses: actions/upload-artifact@v6
        with:
          name: gas-report-standard
          path: gas-report.txt
          retention-days: 30
          if-no-files-found: ignore

  ci-fuzz:
    name: CI Fuzzing (10000 runs)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run CI profile fuzz tests
        env:
          FOUNDRY_PROFILE: ci
        run: |
          forge test -vv

      - name: Run CI profile invariant tests
        env:
          FOUNDRY_PROFILE: ci
        run: |
          forge test --match-contract Invariant -vvv || true

      - name: Generate detailed gas report
        env:
          FOUNDRY_PROFILE: ci
        run: |
          forge test --gas-report > gas-report-ci.txt || true
          cat gas-report-ci.txt

      - name: Upload CI gas report
        uses: actions/upload-artifact@v6
        with:
          name: gas-report-ci
          path: gas-report-ci.txt
          retention-days: 90
          if-no-files-found: ignore

      - name: Generate CI fuzzing summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🔬 CI Fuzzing Results

          **Profile**: CI (10,000 runs)
          **Invariant runs**: 1,000
          **Invariant depth**: 20

          ### Configuration
          - **Fuzz runs**: 10,000
          - **Max test rejects**: 65,536
          - **Dictionary weight**: 40%
          - **Include storage**: Yes
          - **Include push bytes**: Yes

          ### Invariant Testing
          - **Runs**: 1,000
          - **Depth**: 20 calls per run
          - **Fail on revert**: No
          - **Dictionary weight**: 80%
          - **Shrink limit**: 5,000

          ### Purpose
          Comprehensive fuzzing for CI/CD pipeline to catch edge cases
          before merging to main branch.

          ---
          EOF

  example-tests:
    name: Example Test Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Verify example tests compile
        run: |
          cd docs/testing-examples
          forge init --no-git --force . || true
          forge install foundry-rs/forge-std --no-git --no-commit || true

      - name: Run InvariantTestExample
        continue-on-error: true
        run: |
          cd docs/testing-examples
          forge test --match-contract InvariantTests -vvv || echo "Invariant tests are examples only"

      - name: Run EchidnaTestExample verification
        continue-on-error: true
        run: |
          cd docs/testing-examples
          forge test --match-contract FuzzTests -vv || echo "Example fuzz tests verification complete"

  fuzzing-summary:
    name: Fuzzing Summary
    runs-on: ubuntu-latest
    needs: [quick-fuzz, standard-fuzz, ci-fuzz]
    if: always()
    steps:
      - name: Generate overall fuzzing summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 📊 Foundry Fuzzing Summary

          ### Fuzzing Profiles Executed
          1. **Quick** (32 runs) - Fast development feedback
          2. **Standard** (256 runs) - Default testing
          3. **CI** (10,000 runs) - Comprehensive pre-merge testing

          ### Advanced Testing Features
          - ✅ Property-based fuzzing
          - ✅ Invariant testing with handlers
          - ✅ Ghost variable tracking
          - ✅ Coverage-guided input generation
          - ✅ Failure shrinking
          - ✅ Gas optimization reporting

          ### Fuzzing Configuration Highlights

          **Input Generation:**
          - Dictionary-based fuzzing for realistic values
          - Storage inclusion for state-dependent tests
          - Push bytes for bytecode fuzzing
          - Deterministic seeding for reproducibility

          **Invariant Testing:**
          - Multi-depth call sequences (up to 20 deep)
          - Handler-based input restriction
          - Ghost variables for expected state tracking
          - Automatic failure minimization

          ### Testing Philosophy

          **Foundry Fuzzing:**
          ```
          Property Tests (testFuzz_*)
              ↓
          Invariant Tests (invariant_*)
              ↓
          Handler Contracts
              ↓
          Ghost Variable Tracking
          ```

          ### Available Profiles
          - `quick` - 32 runs (development)
          - `default` - 256 runs (standard)
          - `ci` - 10,000 runs (CI/CD)
          - `intense` - 50,000 runs (security audits)

          ### Running Locally
          ```bash
          # Quick fuzzing
          FOUNDRY_PROFILE=quick forge test

          # CI fuzzing
          FOUNDRY_PROFILE=ci forge test

          # Invariant tests only
          forge test --match-contract Invariant -vvv

          # With gas report
          forge test --gas-report
          ```

          ### Documentation
          - [Foundry Configuration](../../foundry.toml)
          - [Invariant Test Example](../../docs/testing-examples/InvariantTestExample.sol)
          - [Testing Strategies Guide](../../docs/TESTING-STRATEGIES.md)

          ### Additional Tools
          - **Echidna**: Specialized smart contract fuzzer
            - Config: `echidna.yaml`
            - Example: `docs/testing-examples/EchidnaTestExample.sol`
            - Run: `echidna . --contract EchidnaTestExample --config echidna.yaml`

          ---
          *Comprehensive fuzzing for smart contract security* 🛡️
          EOF
