name: AI-Powered Engineering Agent

on:
  schedule:
    # Run weekly on Monday at 6 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  ai-engineer-suggestions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install analysis dependencies
        run: |
          python -m pip install --upgrade pip
          # No additional dependencies needed - using stdlib only

      - name: Run comprehensive codebase analysis
        id: analyze
        run: |
          echo "Running deep codebase analysis..."
          python scripts/ai_engineer_analysis.py > codebase_analysis.json
          
          echo "Analysis complete. Summary:"
          python -c "
          import json
          with open('codebase_analysis.json') as f:
              data = json.load(f)
          print(f\"📊 Total commits (90d): {data['commits']['total_commits']}\")
          print(f\"📁 Python files: {data['code_patterns']['total_python_files']}\")
          print(f\"⚠️  TODOs found: {data['code_patterns']['todo_count']}\")
          print(f\"🧪 Test files: {data['test_coverage']['test_files']}\")
          print(f\"📜 Solidity contracts: {data['solidity_contracts']['contract_count']}\")
          print(f\"🎯 Improvement areas: {', '.join(data['improvement_areas'])}\")
          "
      
      - name: Gather security intelligence
        id: security_intel
        run: |
          echo "Gathering security intelligence..."
          python scripts/security_intelligence.py > security_intel.json
          
          echo "Intelligence gathered:"
          python -c "
          import json
          with open('security_intel.json') as f:
              data = json.load(f)
          print(f\"🔒 Python CVE patterns: {len(data['python_cves'])}\")
          print(f\"💥 DeFi exploit patterns: {len(data['defi_exploits'])}\")
          print(f\"✅ Solidity best practices: {len(data['solidity_best_practices'])}\")
          print(f\"🐍 Python 3.11+ features: {len(data['python_advanced_features'])}\")
          print(f\"🧪 Testing strategies: {len(data['testing_strategies'])}\")
          "
      
      - name: Generate AI-powered recommendations
        id: recommendations
        run: |
          echo "Generating context-aware recommendations..."
          python -c "
          import json
          
          # Combine analysis and intelligence
          with open('codebase_analysis.json') as f:
              codebase = json.load(f)
          with open('security_intel.json') as f:
              intel = json.load(f)
          
          combined = {
              'timestamp': codebase['timestamp'],
              'codebase_analysis': codebase,
              'security_intel': intel
          }
          
          print(json.dumps(combined))
          " | python scripts/generate_recommendations.py > recommendations.json
          
          echo "Recommendations generated:"
          python -c "
          import json
          with open('recommendations.json') as f:
              data = json.load(f)
          print(f\"📝 Generated {data['recommendation_count']} recommendations\")
          for rec in data['recommendations']:
              print(f\"  - [{rec['priority']}] {rec['title']}\")
          "

      - name: Create GitHub issues from recommendations
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            
            // Load recommendations
            const recommendations = JSON.parse(fs.readFileSync('recommendations.json', 'utf8'));
            
            core.info(`Processing ${recommendations.recommendation_count} recommendations`);
            
            // Get existing AI suggestion issues
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ai-suggestion'
            });
            
            let created = 0;
            let skipped = 0;
            let updated = 0;
            
            for (const issue of recommendations.github_issues) {
              // Check for duplicate by title
              const existing = existingIssues.data.find(i => i.title === issue.title);
              
              if (existing) {
                // Check if we should update the existing issue
                const issueAge = new Date() - new Date(existing.created_at);
                const weekInMs = 7 * 24 * 60 * 60 * 1000;
                
                if (issueAge > weekInMs) {
                  // Update old issue with fresh information
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existing.number,
                    body: `## 🔄 Updated Recommendation\n\n${issue.body}\n\n---\n*Updated by AI Engineer (${new Date().toISOString()})*`
                  });
                  core.info(`Updated issue #${existing.number}: ${issue.title}`);
                  updated++;
                } else {
                  core.info(`Skipping recent duplicate: ${issue.title}`);
                  skipped++;
                }
              } else {
                // Create new issue
                const created_issue = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issue.title,
                  body: issue.body,
                  labels: issue.labels
                });
                core.info(`Created issue #${created_issue.data.number}: ${issue.title}`);
                created++;
              }
            }
            
            // Set summary
            core.summary
              .addHeading('🤖 AI Engineer Results')
              .addTable([
                [{data: 'Metric', header: true}, {data: 'Count', header: true}],
                ['Recommendations Generated', String(recommendations.recommendation_count)],
                ['New Issues Created', String(created)],
                ['Existing Issues Updated', String(updated)],
                ['Duplicates Skipped', String(skipped)]
              ]);
            
            await core.summary.write();
            
            core.info(`Summary: ${created} created, ${updated} updated, ${skipped} skipped`);

      - name: Generate summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🤖 AI-Powered Engineering Agent Summary

          ### Analysis Completed
          - ✅ Codebase structure analysis
          - ✅ Latest security research reviewed
          - ✅ Best practices evaluated
          - ✅ Improvement suggestions generated

          ### Suggestion Categories
          - 🚀 **Gas Optimization**: Solidity gas-saving patterns
          - 🔒 **Type Safety**: Python 3.11+ advanced features
          - 🛡️ **Security Patterns**: State-of-the-art contract security
          - 🧪 **Testing**: Property-based testing and fuzzing
          - 📦 **Supply Chain**: SBOM and dependency security

          ### Research Sources
          - Latest EIPs and PEPs
          - Recent security audit reports
          - DeFi Security Summit findings
          - Trail of Bits publications
          - Consensys best practices
          - Academic papers on smart contract security

          ### Generated Issues
          Issues created with detailed implementation guidance and references to:
          - Research papers and blog posts
          - Audit reports
          - Best practice guides
          - Code examples

          ### Next Steps
          1. Review created issues
          2. Prioritize based on security impact
          3. Implement high-priority suggestions
          4. Schedule follow-up for long-term improvements

          ---
          *AI-powered continuous improvement for security research* 🎯
          EOF
