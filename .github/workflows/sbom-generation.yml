name: SBOM Generation

on:
  schedule:
    # Run weekly on Mondays at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'requirements.txt'
      - 'secbrain/pyproject.toml'
      - 'secbrain/requirements.lock'
      - 'secbrain/requirements.in'
      - 'secbrain/requirements-hashed.txt'
  pull_request:
    paths:
      - 'requirements.txt'
      - 'secbrain/pyproject.toml'
      - 'secbrain/requirements.lock'
      - 'secbrain/requirements-hashed.txt'

permissions:
  contents: read
  security-events: write

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd secbrain
          # Use hash-verified requirements for supply chain security
          pip install -r requirements-hashed.txt
          pip install pip-audit cyclonedx-bom pip-licenses

      - name: Generate CycloneDX SBOM (JSON)
        id: cyclonedx-json
        continue-on-error: true
        run: |
          cd secbrain
          mkdir -p ../sbom
          pip-audit --format cyclonedx-json --output ../sbom/sbom-cyclonedx.json || \
          cyclonedx-py -r requirements-hashed.txt -o ../sbom/sbom-cyclonedx.json --format json
          echo "Generated CycloneDX JSON SBOM"

      - name: Generate CycloneDX SBOM (XML)
        id: cyclonedx-xml
        continue-on-error: true
        run: |
          cd secbrain
          cyclonedx-py -r requirements-hashed.txt -o ../sbom/sbom-cyclonedx.xml --format xml
          echo "Generated CycloneDX XML SBOM"

      - name: Generate SPDX SBOM
        id: spdx
        continue-on-error: true
        run: |
          cd secbrain
          python3 << 'PYTHON_SCRIPT'
          import json
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          sbom_dir = Path("../sbom")
          sbom_dir.mkdir(exist_ok=True)

          # Get installed packages
          result = subprocess.run(
              ["pip", "list", "--format=json"],
              capture_output=True,
              text=True,
              check=True
          )
          packages = json.loads(result.stdout)

          # Create SPDX document
          spdx_doc = {
              "spdxVersion": "SPDX-2.3",
              "dataLicense": "CC0-1.0",
              "SPDXID": "SPDXRef-DOCUMENT",
              "name": "secbrain-dependencies",
              "documentNamespace": f"https://github.com/blairmichaelg/secbrain/sbom-{datetime.now(timezone.utc).strftime('%Y%m%d%H%M%S')}",
              "creationInfo": {
                  "created": datetime.now(timezone.utc).isoformat(),
                  "creators": ["Tool: GitHub Actions", "Organization: SecBrain"],
                  "licenseListVersion": "3.21"
              },
              "packages": []
          }

          # Add each package
          for idx, pkg in enumerate(packages):
              pkg_info = {
                  "SPDXID": f"SPDXRef-Package-{idx}",
                  "name": pkg["name"],
                  "versionInfo": pkg["version"],
                  "downloadLocation": f"https://pypi.org/project/{pkg['name']}/{pkg['version']}/",
                  "filesAnalyzed": False,
                  "supplier": "Organization: PyPI"
              }
              spdx_doc["packages"].append(pkg_info)

          # Write SPDX SBOM
          with open(sbom_dir / "sbom-spdx.json", "w") as f:
              json.dump(spdx_doc, f, indent=2)

          print(f"Generated SPDX SBOM with {len(packages)} packages")
          PYTHON_SCRIPT

      - name: Generate License Report
        id: license-report
        continue-on-error: true
        run: |
          cd secbrain
          pip-licenses --format=json --with-authors --with-urls --output-file=../sbom/license-report.json
          pip-licenses --format=markdown --with-authors --with-urls --output-file=../sbom/license-report.md
          echo "Generated license reports"

      - name: Scan for vulnerabilities
        id: vulnerability-scan
        continue-on-error: true
        run: |
          cd secbrain
          pip-audit --format json --output ../sbom/vulnerabilities.json || true
          echo "Completed vulnerability scan"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v6
        with:
          name: sbom-reports
          path: |
            sbom/sbom-cyclonedx.json
            sbom/sbom-cyclonedx.xml
            sbom/sbom-spdx.json
            sbom/license-report.json
            sbom/license-report.md
            sbom/vulnerabilities.json
          retention-days: 90

      - name: Generate SBOM summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 📦 Software Bill of Materials (SBOM) Generated

          ### SBOM Formats Created
          - ✅ **CycloneDX JSON**: Industry standard machine-readable format
          - ✅ **CycloneDX XML**: Compatible with most SBOM analysis tools
          - ✅ **SPDX JSON**: Compliance and legal standard format
          - ✅ **License Report**: Full license inventory
          - ✅ **Vulnerability Scan**: Security assessment
          - ✅ **Hash Verification**: All dependencies locked with SHA256 hashes

          ### Supply Chain Security (SLSA)
          - 🔐 **Hash-Verified Dependencies**: Using requirements-hashed.txt with SHA256 checksums
          - 🔒 **Tamper Detection**: pip rejects packages with mismatched hashes
          - 📋 **Reproducible Builds**: Identical dependencies across all environments
          - 🔍 **Audit Trail**: All hash changes tracked in version control

          ### SBOM Use Cases
          1. **Supply Chain Security**: Track all dependencies and their origins
          2. **Vulnerability Management**: Rapid identification of affected components
          3. **License Compliance**: Ensure legal compliance with all dependencies
          4. **Audit Trail**: Complete transparency for security audits
          5. **Risk Assessment**: Identify and manage vendor risks

          ### SBOM Standards
          - **CycloneDX**: OWASP standard for application security contexts
          - **SPDX**: Linux Foundation standard for compliance and licensing

          ### Next Steps
          1. Review SBOM artifacts in workflow artifacts
          2. Import SBOM into security scanning tools
          3. Monitor for new vulnerabilities
          4. Update dependencies as needed

          ### References
          - [CISA SBOM Guide](https://www.cisa.gov/sbom)
          - [CycloneDX Specification](https://cyclonedx.org/)
          - [SPDX Specification](https://spdx.dev/)

          ---
          *Automated SBOM generation for supply chain security* 🔐
          EOF
