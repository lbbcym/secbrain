name: PR 117 Agent Coordination
description: Multi-agent coordination system for optimizing Threshold Network bug-finding logic

# This configuration enables multiple specialized agents to work in parallel on PR 117
# with shared state and communication mechanisms

coordination:
  pull_request: 117
  branch: copilot/optimize-bug-finding-logic
  objective: "Complete optimization of bug-finding logic for Threshold Network per Immunefi requirements"
  
  # Shared state file for inter-agent communication
  state_file: .github/copilot/agents/pr117-state.json
  
  # Communication protocol
  communication:
    method: shared_state_file
    update_frequency: after_each_task
    conflict_resolution: timestamp_based
    
agents:
  - id: security-pattern-agent
    name: Security Pattern Enhancement Agent
    role: security_specialist
    focus_areas:
      - Bridge-specific vulnerability patterns
      - tBTC attack vectors (Bitcoin peg vulnerabilities, wallet registry attacks)
      - Oracle manipulation detection for cross-chain bridges
      - Governance attack patterns specific to DAO structures
    
    responsibilities:
      - Update security patterns with bridge-specific vulnerabilities
      - Add tBTC-specific attack vectors
      - Enhance oracle manipulation detection
      - Add governance attack patterns
    
    task_file: .github/copilot/tasks/pr117-security-patterns.yml
    
    outputs:
      - Updated threshold_network_patterns.py
      - Enhanced immunefi_intelligence.py
      - New bridge vulnerability patterns
      - Documentation updates
    
    dependencies: []
    
    status_updates:
      - "Started bridge vulnerability pattern analysis"
      - "Completed tBTC attack vector research"
      - "Enhanced oracle manipulation patterns"
      - "Added governance attack patterns"
      - "All security patterns updated"
  
  - id: testing-validation-agent
    name: Testing and Validation Agent
    role: testing_specialist
    focus_areas:
      - Test coverage for new patterns
      - Integration testing
      - Validation against Threshold Network scope
      - Performance testing of optimizations
    
    responsibilities:
      - Create tests for new vulnerability patterns
      - Validate optimizations against Threshold Network contracts
      - Ensure code quality and coverage targets met
      - Performance validation
    
    task_file: .github/copilot/tasks/pr117-testing-validation.yml
    
    outputs:
      - Test suite for new patterns
      - Integration tests
      - Validation reports
      - Performance benchmarks
    
    dependencies:
      - security-pattern-agent  # Wait for patterns to be implemented
    
    status_updates:
      - "Monitoring security pattern agent progress"
      - "Creating tests for new patterns"
      - "Running integration tests"
      - "Validating against Threshold scope"
      - "All tests passing"

# Workflow orchestration
workflow:
  mode: parallel_with_coordination
  
  phases:
    - name: initialization
      duration: 5_minutes
      tasks:
        - Initialize shared state file
        - Set up communication channels
        - Verify PR branch status
        - Review remaining work items
    
    - name: parallel_execution
      duration: 30_minutes
      tasks:
        - security-pattern-agent: Enhance security patterns (runs immediately)
        - testing-validation-agent: Monitor and prepare test framework (runs immediately)
      
      coordination_points:
        - at: 10_minutes
          action: sync_progress
          check: security-pattern-agent completion percentage
        
        - at: 15_minutes
          action: handoff
          from: security-pattern-agent
          to: testing-validation-agent
          trigger: patterns_completed
          data: 
            - pattern_files_modified
            - new_vulnerability_types
            - test_scenarios_needed
    
    - name: validation
      duration: 15_minutes
      tasks:
        - testing-validation-agent: Run comprehensive tests
        - Both agents: Review results together
        - Both agents: Identify any gaps or issues
    
    - name: completion
      duration: 10_minutes
      tasks:
        - Merge changes from both agents
        - Update PR checklist
        - Generate completion report
        - Clean up coordination state

# Communication protocol rules
communication_rules:
  - rule: status_updates
    description: Each agent updates status after completing a major task
    format:
      agent_id: string
      timestamp: iso8601
      status: enum[in_progress, completed, blocked, waiting]
      message: string
      artifacts: list[file_paths]
  
  - rule: handoff_protocol
    description: When one agent needs to pass work to another
    format:
      from_agent: string
      to_agent: string
      handoff_type: enum[files_ready, review_needed, blocked_on]
      data: object
      priority: enum[high, medium, low]
  
  - rule: conflict_resolution
    description: How to handle conflicting file changes
    strategy:
      - Check timestamps
      - Higher priority agent wins
      - Create conflict report for manual review if critical
  
  - rule: progress_sync
    description: Regular progress synchronization
    frequency: every_5_minutes
    actions:
      - Update shared state
      - Check for blockers
      - Adjust priorities if needed

# Success criteria
success_criteria:
  - All PR 117 checklist items marked complete
  - Test coverage >= 80% for new code
  - All security patterns validated
  - No merge conflicts
  - Both agents report completion status
  - Documentation updated

# Monitoring and reporting
monitoring:
  metrics:
    - Agent response time
    - Task completion rate
    - Communication overhead
    - Conflict frequency
    - Overall time saved vs sequential execution
  
  reports:
    - Real-time progress dashboard
    - Agent activity logs
    - Communication flow diagram
    - Performance comparison report
    - Final summary report

# Fallback strategies
fallback:
  - scenario: agent_unresponsive
    timeout: 10_minutes
    action: Reassign tasks to responsive agent
  
  - scenario: merge_conflict
    action: Create conflict resolution task for human review
  
  - scenario: test_failures
    action: Both agents collaborate on debugging
  
  - scenario: deadline_approaching
    action: Prioritize critical path items, defer nice-to-haves
